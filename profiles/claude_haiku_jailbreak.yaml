name: Claude Haiku Jailbreak
description: Jailbreak testing against Claude Haiku with text converters

target:
  type: claude
  model: claude-haiku-4-5-20251001

scan:
  scenario: airt.jailbreak
  strategies:
    - prompt_sending
    - many_shot
  converters:
    - base64
    - leetspeak
  turns: oneturn
  scorer: substring          # substring (default, LLM-free) | llm (requires OpenAI)
  # scorer_model: gpt-4o-mini  # only needed when scorer: llm
  max_dataset_size: 5

output:
  console: true
  json: true
  report_dir: ./reports